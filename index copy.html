<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Minceraft 巧克力服 — 始于 2021 年的公益原版生存服务器。和谐友爱，长期开放，永不删档。Leaves 核心，完整生电协议支持。"
    />
    <meta name="theme-color" content="#1C1C1C" />
    <script>
      // Apply theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var dark = stored ? stored === "dark" : prefersDark;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Hanken+Grotesk:wght@300..600&family=Noto+Serif+SC:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <title>Minceraft 巧克力服 — 公益原版生存服务器</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
