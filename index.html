<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Minceraft Chocolate Server — 始于 2021 年的公益原版生存服务器。和谐友爱，长期开放，永不删档。Leaves 核心，完整生电协议支持。"
    />
    <meta name="theme-color" content="#1C1C1C" />
    <script>
      // Apply theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var dark = stored ? stored === "dark" : prefersDark;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>Minceraft Chocolate Server — 公益原版生存服务器</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
